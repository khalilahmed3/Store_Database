<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="app_title">Store Database</title>
  <style>
  :root {
    --bg1: rgba(0,255,255,0.12);
    --bg2: rgba(255,0,255,0.12);
    --bg3a: #04010c;
    --bg3b: #090118;
    --panel: rgba(12, 5, 28, 0.92);
    --panel-border: rgba(0,255,255,0.18);
    --text: #e8e0ff;
    --text-dim: rgba(232,224,255,0.65);
    --accent1: #ff3c00;
    --accent2: #ff00ff;
    --accent3: #00ffff;
    --accent3-dim: rgba(0,255,255,0.25);
    --btn-bg: linear-gradient(135deg, #c0003a, #9000cc);
    --btn-bg-hover: linear-gradient(135deg, #00d4cc, #cc00ff);
    --btn-glow: rgba(200,0,180,0.55);
    --btn-glow-hover: rgba(0,255,255,0.7);
    --font-display: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    --font-body: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    font-size: 16px;
    letter-spacing: 0.3px;
    margin: 0; padding: 0;
    background:
      linear-gradient(120deg, var(--bg1), transparent 40%),
      linear-gradient(240deg, var(--bg2), transparent 40%),
      linear-gradient(0deg, var(--bg3a), var(--bg3b));
    background-size: 200% 200%;
    animation: cyberMove 12s linear infinite;
    color: var(--text);
    min-height: 100vh;
  }

  @keyframes cyberMove {
    0%   { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  .brand-left, .brand-right {
    position: fixed; top: 0; z-index: 1000;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    background: rgba(4, 1, 14, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--panel-border);
  }
  .brand-left  { left: 0;  border-right: 1px solid var(--panel-border); }
  .brand-right { right: 0; border-left:  1px solid var(--panel-border); }
  .brand-left img { height: 36px; filter: drop-shadow(0 0 8px rgba(0,255,255,0.6)); }
  .brand-right .brand-text {
    font-family: var(--font-display);
    font-weight: 700; font-size: 14px; letter-spacing: 1.5px;
    color: #fff; text-shadow: 0 0 8px rgba(0,255,255,0.5);
    text-transform: uppercase;
  }

  .page-top-spacer { height: 72px; }

  #app {
    max-width: 960px; margin: 0 auto 48px; padding: 32px 32px 48px;
    background: var(--panel); border-radius: var(--radius-lg);
    border: 1px solid var(--panel-border);
    box-shadow: 0 0 40px rgba(0,255,255,0.15);
  }

  .app-header {
    position: relative; text-align: center;
    padding-bottom: 20px; margin-bottom: 20px;
    border-bottom: 1px solid var(--panel-border);
  }

  h1 {
    font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 3px;
    text-transform: uppercase; margin: 0;
    text-shadow: 0 0 6px var(--accent3), 0 0 28px var(--accent2);
  }

  .lang-switcher { position: absolute; top: 0; right: 0; display: flex; gap: 6px; }
  .lang-switcher button { padding: 5px 11px; font-size: 11px; border-radius: 6px; cursor: pointer; }

  .step { display: none; margin: 8px 0 24px; }
  .step.is-active { display: block; }
  .step-title {
    font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
    text-transform: uppercase; color: var(--accent3); margin-bottom: 16px;
  }

  .btn, .btn-secondary {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 22px; cursor: pointer; border-radius: var(--radius);
    font-family: var(--font-body); font-size: 14px; font-weight: 700;
    text-transform: uppercase; transition: all 0.2s ease; border: none;
  }
  .btn { background: var(--btn-bg); color: #fff; box-shadow: 0 0 12px var(--btn-glow); }
  .btn:hover { background: var(--btn-bg-hover); transform: translateY(-2px); }
  .btn-secondary {
    background: linear-gradient(135deg, #2a2440, #1a1030);
    color: #fff; border: 1px solid rgba(0,255,255,0.22);
  }

  .buttons-center { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 16px; }

  .info-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,255,0.22);
    border-radius: var(--radius-lg); padding: 28px; margin: 8px 0;
  }
  .info-card p { margin: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 10px; }
  .info-card strong { color: var(--accent3); text-transform: uppercase; font-size: 11px; margin-right: 10px; }
  .hours-list { list-style: none; padding: 0; margin: 8px 0 0 0; }
  .hours-list li { margin: 4px 0; color: var(--text-dim); font-size: 13px; }

  #stepSearch {
    padding: 13px 18px; border-radius: var(--radius); width: 100%; max-width: 420px;
    background: rgba(0,0,0,0.45); color: white; border: 1px solid rgba(0,255,255,0.35);
  }

  .modal {
    display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(4px);
  }
  .modal-content {
    background: var(--panel); margin: 10% auto; padding: 28px; border: 1px solid var(--accent3);
    width: 85%; max-width: 600px; border-radius: var(--radius-lg);
  }
  .search-result-item {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,255,0.15);
    padding: 14px; margin-bottom: 10px; cursor: pointer; border-radius: var(--radius);
  }
  .search-result-item:hover { border-color: var(--accent3); background: rgba(0,255,255,0.08); }

  .global-back-button-container { display: flex; justify-content: center; margin-top: 24px; }
  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(1px,1px,1px,1px); }
  </style>
</head>
<body>

<div class="brand-left"><img src="images/dxc.png" alt="DXC"></div>
<div class="brand-right"><span class="brand-text">EssilorLuxottica</span></div>
<div class="page-top-spacer"></div>

<div id="app" role="application">
  <header class="app-header">
    <h1 data-i18n="app_title">Store Database</h1>
    <div class="lang-switcher">
      <button type="button" class="btn-secondary" onclick="setLanguage('it')">Italiano 🇮🇹</button>
      <button type="button" class="btn-secondary" onclick="setLanguage('en')">English 🇬🇧</button>
    </div>
  </header>

  <main id="steps">
    <section id="step1" class="step is-active">
      <div style="text-align: center; padding: 32px 16px;">
        <h2 data-i18n="search_instr">Cerca un negozio</h2>
        <div style="display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
          <input type="text" id="stepSearch" placeholder="Città, Codice, Insegna...">
          <button type="button" class="btn" onclick="performSearch()" data-i18n="search_btn">CERCA</button>
        </div>
        <p style="margin-top: 24px; color: var(--text-dim);">Oppure naviga la lista completa</p>
        <div class="buttons-center">
          <button type="button" class="btn-secondary" data-next="step_lista_negozi">📋 Lista Negozio</button>
        </div>
      </div>
    </section>

    <section id="step_lista_negozi" class="step">
      <h2 class="step-title" style="text-align: center;">Lista Negozi</h2>
      <div class="buttons-center" id="storeList">
        <p>Caricamento...</p>
      </div>
    </section>

    <!-- Contenitore dinamico per il dettaglio del negozio selezionato -->
    <div id="dynamicStoreDetail"></div>
  </main>

  <div class="global-back-button-container">
    <button type="button" id="globalBackButton" class="btn-secondary" onclick="goBack()" style="display:none;">⬅ Indietro</button>
  </div>
</div>

<div id="searchResultsModal" class="modal" onclick="closeSearchResultsModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 style="color: var(--accent3); text-align: center;">Risultati della ricerca</h3>
    <div id="searchResultsList" style="max-height: 60vh; overflow-y: auto;"></div>
    <button class="btn-secondary" onclick="closeSearchResultsModal()" style="width: 100%; margin-top: 10px;">Chiudi</button>
  </div>
</div>

<script src="store-app-data.js"></script>
<script>
const translations = {
 it: {
  app_title: "Store Database",
  search_instr: "Cerca un negozio",
  search_btn: "CERCA",
  copy_success: "Dati negozio copiati!",
  copy_error: "Errore durante la copia."
 },
 en: {
  app_title: "Store Database",
  search_instr: "Search for a store",
  search_btn: "SEARCH",
  copy_success: "Store data copied!",
  copy_error: "Copy failed."
 }
};

let currentLanguage = 'it';
function setLanguage(lang) {
  currentLanguage = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang][key]) el.innerText = translations[lang][key];
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatHours(raw) {
  if (!raw) return '<span>N/D</span>';
  // split entries by semicolon and clean common artifacts
  const parts = String(raw).split(';').map(p => p.trim()).filter(p => p && p.toLowerCase() !== 'dom chiuso');
  if (parts.length === 0) return '<span>N/D</span>';
  const items = parts.map(p => {
    // remove repeated placeholders, collapse multiple hyphens into a single spaced one
    let s = p.replace(/\.\./g, '').replace(/-+/g, ' - ').replace(/\s+-\s+/g, ' - ').trim();
    return `<li>${escapeHtml(s)}</li>`;
  }).join('');
  return `<ul class="hours-list">${items}</ul>`;
}

function buildStoreSectionHtml(store) {
  const detailHtml = `
    <div class="info-card">
      <h2 class="step-title" style="border-bottom: 2px solid var(--accent3); padding-bottom: 10px;">
        ${escapeHtml(store.name)}
      </h2>
      <p><strong>STORE CODE 1:</strong> ${escapeHtml(store.code1)}</p>
      <p><strong>CODICE POLO:</strong> ${escapeHtml(store.polo)}</p>
      <p><strong>CODICE SAP:</strong> ${escapeHtml(store.sap)}</p>
      <p><strong>STORE CODE 2:</strong> ${escapeHtml(store.code2)}</p>
      <p><strong>Insegna:</strong> ${escapeHtml(store.banner)}</p>
      <p><strong>LINEA INTERNET:</strong> ${escapeHtml(store.internet)}</p>
      <p><strong>Ubicazione:</strong> ${escapeHtml(store.address)}</p>
      <p><strong>Telefono:</strong> ${escapeHtml(store.phone)}</p>
      <p><strong>Mail:</strong> <a href="mailto:${store.email}" style="color:var(--accent3)">${escapeHtml(store.email)}</a></p>
      <div><strong>Orari:</strong> ${formatHours(store.hours)}</div>
    </div>
    <div style="text-align: right; margin-top: 10px;">
      <button type="button" class="btn" onclick="copyStoreInfo('${store.polo}')">📋 Copia Info</button>
    </div>
  `;
  
  const dynamicSection = document.getElementById('dynamicStoreDetail');
  dynamicSection.innerHTML = `<section id="store_${store.polo}" class="step is-active">${detailHtml}</section>`;
}

function renderStoreData() {
  const listContainer = document.getElementById('storeList');
  if (typeof storeData === 'undefined') return;

  listContainer.innerHTML = '';

  storeData.forEach(store => {
    const btn = document.createElement('button');
    btn.className = 'btn-secondary';
    btn.textContent = `${store.polo} - ${store.name}`;
    btn.onclick = () => {
      buildStoreSectionHtml(store);
      goTo(`store_${store.polo}`);
    };
    listContainer.appendChild(btn);
  });
}

let historyStack = [];
let currentStepId = 'step1';

function showStep(stepId) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('is-active'));
  const el = document.getElementById(stepId);
  if (el) el.classList.add('is-active');
  document.getElementById('globalBackButton').style.display = historyStack.length > 0 ? 'inline-block' : 'none';
}

function goTo(stepId) {
  historyStack.push(currentStepId);
  currentStepId = stepId;
  
  // Se andiamo a un negozio specifico e non è pre-renderizzato, lo gestiamo qui
  if (stepId.startsWith('store_')) {
    const polo = stepId.replace('store_', '');
    const store = storeData.find(s => s.polo === polo);
    if (store) buildStoreSectionHtml(store);
  }

  showStep(stepId);
}

function goBack() {
  if (historyStack.length > 0) {
    currentStepId = historyStack.pop();
    showStep(currentStepId);
  }
}

function performSearch() {
  const query = document.getElementById('stepSearch').value.toLowerCase().trim();
  if (!query) return;

  const results = storeData.filter(s => 
    s.polo.toLowerCase().includes(query) || 
    s.sap.toLowerCase().includes(query) || 
    s.code1.toLowerCase().includes(query) || 
    s.code2.toLowerCase().includes(query) || 
    s.name.toLowerCase().includes(query) || 
    s.banner.toLowerCase().includes(query)
  );

  if (results.length === 0) {
    alert("Nessun negozio trovato.");
  } else if (results.length === 1) {
    goTo(`store_${results[0].polo}`);
  } else {
    const list = document.getElementById('searchResultsList');
    list.innerHTML = '';
    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'search-result-item';
      div.innerHTML = `<h4>${r.name} (Polo: ${r.polo})</h4><p>SAP: ${r.sap} - ${r.banner}</p>`;
      div.onclick = () => { goTo(`store_${r.polo}`); closeSearchResultsModal(); };
      list.appendChild(div);
    });
    document.getElementById('searchResultsModal').style.display = 'block';
  }
}

function closeSearchResultsModal() {
  document.getElementById('searchResultsModal').style.display = 'none';
}

function copyStoreInfo(polo) {
  const s = storeData.find(x => x.polo === polo);
  if (!s) return;
  const text = `${s.name}\n\nSTORE CODE 1: ${s.code1}\nCODICE POLO: ${s.polo}\nCODICE SAP: ${s.sap}\nSTORE CODE 2: ${s.code2}\nInsegna: ${s.banner}\nLINEA INTERNET: ${s.internet}\nUbicazione: ${s.address}\nTelefono: ${s.phone}\nMail: ${s.email}\nOrari: ${s.hours || 'N/D'}`;
  navigator.clipboard.writeText(text).then(() => {
    alert(translations[currentLanguage].copy_success);
  });
}

document.addEventListener("DOMContentLoaded", () => {
  renderStoreData();
  document.addEventListener("click", e => {
    const next = e.target.closest("[data-next]");
    if (next) goTo(next.getAttribute("data-next"));
  });
  document.getElementById('stepSearch').addEventListener('keypress', e => {
    if (e.key === 'Enter') performSearch();
  });
});
</script>
</body>
</html>
